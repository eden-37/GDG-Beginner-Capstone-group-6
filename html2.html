<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Movie Finder</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body>


  <section id="hero">
    <h2 id="hero-title">Trending Movie</h2>

  <main id="movies"></main>

  <script src="js2.js"></script>
